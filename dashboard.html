<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX PAY Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="loadDashboard()">

<div class="sidebar">
    <h2>PIX PAY</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="deposit.html">💳 Deposit</a>
    <a href="withdraw.html">💸 Withdraw</a>
    <a href="history.html">📜 History</a>
    <a href="profile.html">👤 Profile</a>
    <a href="settings.html">⚙ Settings</a>
    <a href="index.html">🚪 Logout</a>
</div>

<div class="main-content">

    <div class="topbar">
        <h2>Dashboard</h2>

        <div class="user-box">
            <span id="welcomeUser">👤 Welcome</span>
        </div>
    </div>

    <div class="banner">
        <h1>Welcome to PIX PAY</h1>
        <p>Manage your balance, deposits and withdrawals.</p>
    </div>

    <div class="dashboard">

        <div class="card">
            <h3>💰 Balance</h3>
            <h1>$0.00</h1>
        </div>

        <div class="card">
            <h3>📄 Transactions</h3>
            <h1>0</h1>
        </div>

        <div class="card">
            <h3>🔔 Notifications</h3>
            <h1>0</h1>
        </div>

        <div class="card">
            <h3>✅ Status</h3>
            <h1>Verified</h1>
        </div>

    </div>

    <h2 style="margin-top:40px;color:#d4af37;">Quick Actions</h2>

    <div class="quick-actions">

        <a href="deposit.html"><button>💳 Deposit</button></a>

        <a href="withdraw.html"><button>💸 Withdraw</button></a>

        <a href="history.html"><button>📜 History</button></a>

        <a href="profile.html"><button>👤 Profile</button></a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
